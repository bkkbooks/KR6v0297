body:
  text: 篆額齊馮翊王高潤之碑本文大齊馮翊王金像碑蓋功惟遐道通言在非在自道成闡鷲山大則照神光於大千微則摠百億於微芥乘權授手津被塵沙有感斯應金於長門於西林教於東夏真言邇廣靈弗興不有覺人孰弘斯道至若拔山移海之力復夏興周之上之侶或負氣門延葉累世或神化澹泊百祀千齡莫不委骨高於山岳屑淚多於河海共轉輪迴之苦同歸月寧彼岸平等寺者平所立永平中造定光銅像一區高二丈八尺永熙年金塗訖功像在寺外未得移皇綱紊大行姦大殿正屋京邑為豺狼之窟皇居成戰鬥之場四海分崩八宏淪喪人物將盡盛業祖神皇帝先天奉時觀作於是虎視豹變鷹揚鵲起補西北之虧天紐東南之缺地大拯蒼生康滋頹自崤函西割帝城烽畿甸機衝淪褫便使七政難齊衣冠道缺將令五禮僭制謀遷協於卿士卜從以決蓍龜上下剋從大同於皇輿詔移鞏洛遂空城寺云毀銅駝之術無復連鑣金馬之門寧聞待詔荒涼宮室禾黍生悲寂漠池臺丘墟流歎祖以王業草創逋寇猶志去關泥觀兵故洛見像瓌奇神徵屢感莊嚴具足相好如真若出崛山猶居祇樹時流運謝隱晦多紀遂使明月不淨青蓮未遷福地達人弘道觸物兼懷發菩提覺心希無上正果躬親致禮遷像入寺登給羽林長守武定末世宗文襄皇帝幸河洛歷攬周京睹佛儀相世未嘗有身色光明實所希妙崇申禮敬廣施軍資增給兵力因而年代驟改非固石尚廬易毀簷甍傾褫結構崩頹駁蘚上於雕梁青苔衣於藻井遊麤積座等形住於慧禪草莽生懷神留於智崇行枯淨土之內蓊為茂草太宰河陽道大行臺錄尚書事馮翊王高潤即神武皇帝之稚子文襄景烈孝昭武成四皇帝之弟今帝之懿叔稟精瑤室分萼鄧林叡氣所膺誕茲英哲可謂崑山之上美玉挺生瀛海之中明珠間出迥自數仞崖岸平好士匪梁燕之儔富學豈簡平之背既能調通四氣宣導三光鼎餗由其致和禮教因之敬洽飛真問忠樹聲揮旄方土宇受脤而靜關河德若膏蘇恩同雲雨出軍命將必稟策以折衝掠地屠城會諮謀於帷幄王既通明二洞三知佛之究竟護浮囊於苦海檥寶棹於金河自推轂專征戎奉律治兵餘暇降志玄道鳴鑾展禮蹔駐騑服俄見繡雉飛於梁文貍起於中歎淨宮之彫毀嗟伽藍之落構永言舊事思用脩復割捨侔於布金窮材磬於文梓匠人單五都之妙畫繪極土之奇崢嶸虯糾於鯨棟扶鳳竦於紅梁類玄圃之銀樓等蓬萊之玉闕天衣容裔颺三銖之重像色十力之始可言矣寺則背彼崇邙面茲清洛右依城雉左帶洪陂嵩岳擁其前靈河行其後望景興賢勝地真粵福田於是苦行異人慧心高德皆通九部咸曉二禪乃振錫來儀風大以成田高山虧而作故豐碑宜勒銅柱須標徽猷盛事無殞長葉其詞云覺理常同歸大師遠空播音徽其一彼岸須登寶舟宜運劫石期盡肌膚何悋聖帝英王能其二是屬貞明瓊宮氣瑤室和精氛氳降祉生此人英其三慧劍既佩誡珠是興干雲臨旭其四雕梁柱壁丹櫨朱扉玉砌青瑣金鋪風鳴韻鐸日照和珠高山仰城隩潤招提是構三乘七覺衢道俟問其六山虧一匱海涸三田殷墟闃寂周室大齊武平三年歲在壬辰八月十五日刊
